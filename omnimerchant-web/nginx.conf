server {
    listen 80;
    server_name omnimerchant.tech www.omnimerchant.tech;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name omnimerchant.tech www.omnimerchant.tech;

    ssl_certificate /etc/letsencrypt/live/omnimerchant.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/omnimerchant.tech/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Vue SPA static files
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # API reverse proxy (SSE support critical)
    location /api/ {
        proxy_pass http://app:8090/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Vue SPA fallback — all non-API routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
