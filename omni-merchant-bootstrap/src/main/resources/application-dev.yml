spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      url: jdbc:mysql://localhost:3306/omni_merchant?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
      username: omnimerchant
      password: omnimerchant123
      driver-class-name: com.mysql.cj.jdbc.Driver
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      filters: stat,wall
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin123
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.3
          maxTokens: 4096
        connect-timeout: 30s
        read-timeout: 60s
      embedding:
        options:
          model: text-embedding-3-small
        connect-timeout: 30s
        read-timeout: 30s
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: claude-haiku-4-5-20251001
          temperature: 0.3
          maxTokens: 4096
        connect-timeout: 30s
        read-timeout: 60s

omnimerchant:
  pgvector:
    url: jdbc:postgresql://localhost:5432/omni_merchant
    username: omnimerchant
    password: omnimerchant123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 5000
  llm:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: https://api.deepseek.com
      model: deepseek-chat
  knowledge:
    embedding:
      cache-ttl-hours: 1
      batch-size: 20
    chunking:
      default-size: 500
      default-overlap: 50
    retrieval:
      vector-top-k: 20
      bm25-top-k: 20
      rrf-k: 60
      rerank-top-n: 10
    reranker:
      url: http://localhost:8001/rerank
      timeout-seconds: 5

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.omnimerchant.**.entity

rocketmq:
  name-server: localhost:9876
  producer:
    group: omni-producer-group

# PostgreSQL (PGVector) 配置 - 用于向量存储和检索
# 如需启用，请取消注释并配置正确的连接信息
